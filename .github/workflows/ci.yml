# .github/workflows/ci.yml
#
# Continuous Integration pipeline for task-api.
#
# On every push and pull request to main:
#   1. Check out the code
#   2. Install dependencies
#   3. Run the linter
#   4. Start a PostgreSQL service container
#   5. Apply database migrations
#   6. Run all tests
#
# If any step fails, the whole run is marked failed (red X).
# If everything passes, the run is marked successful (green check).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    # Service containers run alongside the job. GitHub starts them
    # before the steps run and tears them down after.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: taskpass
          POSTGRES_DB: taskdb_test
        ports:
          - 5432:5432
        # Wait until Postgres is actually ready before starting steps.
        options: >-
          --health-cmd "pg_isready -U taskuser -d taskdb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # Environment variables available to all steps in this job.
    env:
      DATABASE_URL: postgresql://taskuser:taskpass@localhost:5432/taskdb_test
      JWT_SECRET: ci-test-secret-not-used-in-production
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache npm downloads between runs for speed
          cache: 'npm'

      # npm ci is the CI-friendly install: fast, reproducible, uses the lockfile
      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      # Apply database migrations to the service container's database
      - name: Run migrations
        run: npm run migrate:up

      - name: Run tests
        run: npm test