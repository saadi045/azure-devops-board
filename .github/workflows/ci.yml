# .github/workflows/ci.yml
#
# Continuous Integration pipeline for task-api.
#
# Three independent jobs run in parallel on every push and PR to main:
#   - lint:  runs ESLint
#   - test:  runs migrations + the full test suite against PostgreSQL
#   - build: verifies the production Docker image builds successfully
#
# Each job reports its own pass/fail status, so failures are easy to locate.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------
  # Job 1: Lint
  # Fast static analysis. No database needed.
  # -----------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  # -----------------------------------------------------------------
  # Job 2: Test
  # Runs the full test suite against a real PostgreSQL service container.
  # -----------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: taskpass
          POSTGRES_DB: taskdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskuser -d taskdb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://taskuser:taskpass@localhost:5432/taskdb_test
      JWT_SECRET: ci-test-secret-not-used-in-production
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate:up

      - name: Run tests
        run: npm test

  # -----------------------------------------------------------------
  # Job 3: Build
  # Verifies the production Docker image builds cleanly.
  # Catches Dockerfile bugs before they reach deployment.
  # -----------------------------------------------------------------
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: task-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max